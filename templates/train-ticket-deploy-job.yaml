apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: {{ .Values.namespace }}
spec:
  type: ExternalName
  externalName: jaeger-agent.observe.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: {{ .Values.namespace }}
spec:
  type: ExternalName
  externalName: jaeger-agent.observe.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: {{ .Values.namespace }}
spec:
  type: ExternalName
  externalName: jaeger-agent.observe.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: {{ .Values.namespace }}
spec:
  type: ExternalName
  externalName: jaeger-agent.observe.svc.cluster.local
---
apiVersion: batch/v1
kind: Job
metadata:
  name: train-ticket-deploy
  namespace: {{ .Values.namespace }}
spec:
  template:
    spec:
      serviceAccountName: train-ticket-deploy-sa
      containers:
        - name: train-ticket-deploy
          image: {{ .Values.job.image }}
          imagePullPolicy: {{ .Values.job.imagePullPolicy }}
          env:
            - name: NAMESPACE
              value: "{{ .Values.namespace }}"
      restartPolicy: OnFailure
